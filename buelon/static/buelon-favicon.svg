  <circle cx="36.8" cy="35.7" r="1.3" fill="#071c3d"/>
  <path d="M28.8 39.4c2 2 4.5 2 6.7-.2" fill="none" stroke="#071c3d" stroke-width="2.4" stroke-linecap="round"/>

