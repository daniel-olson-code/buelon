  <path d="M33.8 20.6c5.9.7 10.8 4.4 10.8 11 0 1.7-.3 3.2-.9 4.7-1.8-.5-4.5-1.8-6.5-4.3-2.2-2.9-3-7.6-3.4-11.4Z" fill="#102846"/>

